name: MiTV 24/7 Streamer
on:
  workflow_dispatch: # Button se start karne ke liye
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad khud restart hoga

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Run Engine
        run: python mitv_engine.py
        
